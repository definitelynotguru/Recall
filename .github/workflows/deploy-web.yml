name: Deploy web

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm install -g vercel@54
      - name: Stage shared JSON for Vercel upload
        run: npm run stage-shared
      - name: Deploy production
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.PRODUCTION_URL || 'https://recall-aevum-s-projects1.vercel.app' }}
    steps:
      - name: Login page responds
        run: curl -sf "$BASE_URL/login" -o /dev/null

      - name: Sync requires auth
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$BASE_URL/api/v1/sync" \
            -H "Content-Type: application/json" \
            -d '{"device_id":"smoke","last_sync_at":"1970-01-01T00:00:00Z","notes":[],"reminders":[]}')
          test "$code" = "401"

      - name: Sync status requires auth
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/v1/sync/status")
          test "$code" = "401"
