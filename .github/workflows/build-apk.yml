name: Build Recall APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: API URL baked into the APK (BuildConfig)
        required: false
        default: https://recall-aevum-s-projects1.vercel.app/api/v1
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Configure SDK and API URL
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME}" >> local.properties
          echo "API_BASE_URL=${{ inputs.api_base_url || 'https://recall-aevum-s-projects1.vercel.app/api/v1' }}" >> local.properties

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/debug/recall-1.0.0-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: recall-debug-apk
          path: android/app/build/outputs/apk/debug/recall-1.0.0-debug.apk
          if-no-files-found: error

      - name: Summary
        run: |
          echo "### Recall debug APK" >> "$GITHUB_STEP_SUMMARY"
          echo "Download **recall-debug-apk** from this workflow run's Artifacts." >> "$GITHUB_STEP_SUMMARY"
          ls -lh android/app/build/outputs/apk/debug/recall-1.0.0-debug.apk
