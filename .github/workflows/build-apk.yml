name: Build Recall APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: API URL baked into the APK (BuildConfig)
        required: false
        default: https://recall-aevum-s-projects1.vercel.app/api/v1
  push:
    branches: [main]
    paths:
      - "android/**"
      - "shared/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Configure SDK and API URL
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_HOME}" >> local.properties
          echo "API_BASE_URL=${{ inputs.api_base_url || 'https://recall-aevum-s-projects1.vercel.app/api/v1' }}" >> local.properties
          echo "UPDATE_APK_URL=https://github.com/definitelynotguru/Recall/releases/download/v1.0.4-debug/recall-1.0.4-debug.apk" >> local.properties

      - name: Unit tests
        working-directory: android
        run: chmod +x gradlew && ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/debug/recall-1.0.4-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: recall-debug-apk
          path: android/app/build/outputs/apk/debug/recall-1.0.4-debug.apk
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4-debug
          name: Recall v1.0.4-debug
          files: android/app/build/outputs/apk/debug/recall-1.0.4-debug.apk
          make_latest: true
          overwrite_files: true

      - name: Summary
        run: |
          echo "### Recall debug APK" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: **recall-debug-apk** · Release: **v1.0.4-debug**" >> "$GITHUB_STEP_SUMMARY"
          ls -lh android/app/build/outputs/apk/debug/recall-1.0.4-debug.apk
