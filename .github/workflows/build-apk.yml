name: Build Recall APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: API URL baked into the APK (BuildConfig)
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "android/**"
      - "shared/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "android/**"
      - "shared/**"
      - ".github/workflows/build-apk.yml"

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Read app version
        id: version
        working-directory: android
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk=recall-${VERSION_NAME}-debug.apk" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}-debug" >> "$GITHUB_OUTPUT"

      - name: Configure SDK and API URL
        working-directory: android
        env:
          API_BASE_URL: ${{ inputs.api_base_url || vars.PRODUCTION_API_URL || 'https://recall-aevum-s-projects1.vercel.app/api/v1' }}
        run: |
          echo "sdk.dir=${ANDROID_HOME}" >> local.properties
          echo "API_BASE_URL=${API_BASE_URL}" >> local.properties
          echo "UPDATE_APK_URL=https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ steps.version.outputs.apk }}" >> local.properties

      - name: Unit tests
        working-directory: android
        run: chmod +x gradlew && ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Lint
        working-directory: android
        run: chmod +x gradlew && ./gradlew :app:lintDebug --no-daemon

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "android/app/build/outputs/apk/debug/${{ steps.version.outputs.apk }}"

      - uses: actions/upload-artifact@v4
        with:
          name: recall-debug-apk
          path: android/app/build/outputs/apk/debug/${{ steps.version.outputs.apk }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Recall ${{ steps.version.outputs.tag }}
          files: android/app/build/outputs/apk/debug/${{ steps.version.outputs.apk }}
          make_latest: true
          overwrite_files: true

      - name: Summary
        run: |
          echo "### Recall debug APK" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: **recall-debug-apk** · Release: **${{ steps.version.outputs.tag }}**" >> "$GITHUB_STEP_SUMMARY"
          ls -lh "android/app/build/outputs/apk/debug/${{ steps.version.outputs.apk }}"
