# Applies Drizzle schema to production Postgres. Requires DATABASE_URL in GitHub Actions secrets.
name: Database schema push

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/src/lib/db/schema.ts"
      - "web/drizzle/**"
      - ".github/workflows/db-push.yml"

jobs:
  push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
