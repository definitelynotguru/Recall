name: Production API smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.PRODUCTION_URL || 'https://recall-aevum-s-projects1.vercel.app' }}
    steps:
      - name: Login page responds
        run: curl -sf "$BASE_URL/login" -o /dev/null

      - name: Sync requires auth
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$BASE_URL/api/v1/sync" \
            -H "Content-Type: application/json" \
            -d '{"device_id":"smoke","last_sync_at":"1970-01-01T00:00:00Z","notes":[],"reminders":[]}')
          test "$code" = "401"
