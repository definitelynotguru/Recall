<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Recall app icon</title>
  <desc id="desc">A warm ink and copper logo mark combining a note page with a reminder ring.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="72%" cy="18%" r="72%">
      <stop offset="0%" stop-color="#2F2119"/>
      <stop offset="47%" stop-color="#1A1814"/>
      <stop offset="100%" stop-color="#0F0E0C"/>
    </radialGradient>
    <linearGradient id="copper" x1="247" y1="170" x2="786" y2="861" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E4A27A"/>
      <stop offset="45%" stop-color="#C17F59"/>
      <stop offset="100%" stop-color="#8E4F35"/>
    </linearGradient>
    <linearGradient id="paper" x1="329" y1="258" x2="706" y2="765" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF6E8"/>
      <stop offset="100%" stop-color="#D9D1C2"/>
    </linearGradient>
    <filter id="softShadow" x="148" y="142" width="728" height="762" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="copperGlow" x="90" y="82" width="844" height="844" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.756  0 1 0 0 0.498  0 0 1 0 0.349  0 0 0 0.65 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bgGlow)"/>
  <rect x="91" y="91" width="842" height="842" rx="199" stroke="#E8E4DC" stroke-opacity="0.055" stroke-width="2"/>

  <!-- reminder orbit -->
  <g filter="url(#copperGlow)">
    <circle cx="512" cy="512" r="298" stroke="url(#copper)" stroke-width="44" stroke-linecap="round"
            stroke-dasharray="1390 210" transform="rotate(-38 512 512)"/>
    <circle cx="733" cy="306" r="38" fill="url(#copper)"/>
  </g>

  <!-- note page -->
  <g filter="url(#softShadow)">
    <path d="M331 246C331 221.699 350.699 202 375 202H614L737 325V733C737 757.301 717.301 777 693 777H375C350.699 777 331 757.301 331 733V246Z" fill="url(#paper)"/>
    <path d="M615 203V310C615 334.301 634.699 354 659 354H737L615 203Z" fill="#C17F59" fill-opacity="0.28"/>
    <path d="M615 203V310C615 334.301 634.699 354 659 354H737" stroke="#0F0E0C" stroke-opacity="0.14" stroke-width="8" stroke-linejoin="round"/>
    <path d="M331 246C331 221.699 350.699 202 375 202H614L737 325V733C737 757.301 717.301 777 693 777H375C350.699 777 331 757.301 331 733V246Z" stroke="#0F0E0C" stroke-opacity="0.12" stroke-width="8"/>
  </g>

  <!-- timeline / reminder detail -->
  <path d="M419 441H606" stroke="#0F0E0C" stroke-opacity="0.72" stroke-width="34" stroke-linecap="round"/>
  <path d="M419 540H648" stroke="#0F0E0C" stroke-opacity="0.44" stroke-width="34" stroke-linecap="round"/>
  <path d="M419 639H566" stroke="#0F0E0C" stroke-opacity="0.26" stroke-width="34" stroke-linecap="round"/>
  <circle cx="648" cy="540" r="23" fill="url(#copper)"/>
  <path d="M648 540V464M648 540L704 588" stroke="#0F0E0C" stroke-opacity="0.68" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
</svg>